<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>دخول الإدارة — نظام قياس رضا المستفيدين</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" />
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <main class="fullscreen-page login-screen">
    <div class="login-card card">
      <h1 class="login-title">🔒 دخول الإدارة</h1>

      <div id="errorAlert" class="alert alert-error d-none"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">اسم المستخدم</label>
          <input type="text" id="username" class="form-control" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" class="form-control" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">دخول</button>
      </form>

      <a href="index.html" class="back-link">← العودة للشاشة الرئيسية</a>
    </div>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
